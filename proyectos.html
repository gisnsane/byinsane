      <!-- PERFORMANCE: la primera imagen de la grilla es la única
           above-the-fold. fetchpriority="high" le dice al navegador
           que la descargue antes que cualquier otra cosa.
           Las demás usan loading="lazy" + decoding="async" para no
           bloquear el hilo principal mientras decodifican. -->

      <div class="project"
        data-title="LUCY NORIEGA - 2026"
        data-desc="A personal photographic project, developed from my own family experience.
The work begins with the figure of a great-aunt as an entry point for an exploration of family memory and its forms of transmission. It is built from the intimate, where bonds depend not only on direct proximity, but also on objects, stories, and gestures that transcend time.
More than simply recording a history, the project observes how family dynamics are activated in the everyday and in the domestic space, and how the image can approach those layers of memory, affection, and distance that coexist within the same house."
        data-images="img/proyectos/lucy/lucy-1.webp,img/proyectos/lucy/lucy-2.webp,
img/proyectos/lucy/lucy-3.webp,img/proyectos/lucy/lucy-4.webp,
img/proyectos/lucy/lucy-5.webp"
        data-video="img/proyectos/lucy/lucy-video-1.mp4">
        <!-- Primera imagen: carga eager + alta prioridad para evitar LCP tardío -->
        <img src="img/proyectos/lucy/lucy-1-thumb.webp"
             alt="Lucy Noriega project"
             fetchpriority="high"
             decoding="async"
             width="800" height="1000">
      </div>

      <div class="project"
        data-title="CONCRETE - 2026"
        data-desc="We reject uniformity as a lie. Existence is a space where goodness and cruelty do not compete, but coexist; from this tension is born a structure that is not entirely natural, yet is alive. Concrete is the residue of this duality; it is the rough skin and artificial bone of the world we inhabit."
        data-images="img/proyectos/alex/alex-1.webp,img/proyectos/alex/alex-2.webp,
img/proyectos/alex/alex-3.webp,img/proyectos/alex/alex-4.webp,
img/proyectos/alex/alex-5.webp,img/proyectos/alex/alex-6.webp,
img/proyectos/alex/alex-7.webp,img/proyectos/alex/alex-8.webp">
        <img loading="lazy" decoding="async"
             src="img/proyectos/alex/alex-1-thumb.webp"
             alt="Concrete project"
             width="800" height="1000">
      </div>

      <div class="project"
        data-title="AKIRA - 2026"
        data-desc="Photographic record created at TerSo based on a conversation with Enrique and his alter ego, Akira.
The work explores his relationship with creation through a practice that moves between different identities and forms of expression, where photography serves as a means to approach his creative process and his search for his own voice.
The images are situated in this transition between the personal and the performative, documenting how identity is constructed and shifts within a constantly evolving creative environment."
        data-images="img/proyectos/akira/akira-1.webp,img/proyectos/akira/akira-2.webp,
img/proyectos/akira/akira-3.webp,img/proyectos/akira/akira-4.webp,
img/proyectos/akira/akira-5.webp">
        <img loading="lazy" decoding="async"
             src="img/proyectos/akira/akira-1-thumb.webp"
             alt="Akira project"
             width="800" height="1000">
      </div>

      <div class="project"
        data-title="AGUA DULCE - HILADO AL SOL - 2026"
        data-desc="Photo campaign for the Hilado al sol collection by Agua Dulce, pieces made in hand crochet."
        data-images="img/proyectos/ad/ad-1.webp,img/proyectos/ad/ad-2.webp,
img/proyectos/ad/ad-3.webp,img/proyectos/ad/ad-4.webp,
img/proyectos/ad/ad-5.webp">

      <div class="project"

img/proyectos/emilio/emilio-3.webp,img/proyectos/emilio/emilio-4.webp,
img/proyectos/emilio/emilio-5.webp">
        <img loading="lazy" decoding="async"
             src="img/proyectos/emilio/emilio-1-thumb.webp"

      <div class="project"
        data-title="VIENTO EN TARDES CALIENTES - 2025"

        data-images="img/proyectos/cri/cri-1.webp,img/proyectos/cri/cri-2.webp,
img/proyectos/cri/cri-3.webp,img/proyectos/cri/cri-4.webp">

             width="800" height="1000">
      </div>

img/proyectos/aptbs/aptbs-3.webp,img/proyectos/aptbs/aptbs-4.webp,img/proyectos/aptbs/aptbs-5.webp"

             width="800" height="1000">
      </div>

      <div class="project"
        data-title="HIJOS DEL SOL - IN PROGRESS"
        data-desc=""Hijos del sol" is an ongoing photographic project, inspired by images captured throughout Lima and the various places I travel to in Peru. Through these records, a personal perspective on the territory is constructed, where each scene connects landscapes, moments, and ways of inhabiting the same shared space."
        data-images="img/proyectos/hds/hds-1.webp,img/proyectos/hds/hds-2.webp,
img/proyectos/hds/hds-3.webp,img/proyectos/hds/hds-4.webp,img/proyectos/hds/hds-5.webp">

             alt="Hijos del sol project"
             width="800" height="1000">
      </div>
