      <div class="project"
        data-title="PHOTOPOLIS - HOME-S - GREECE 2026"
        data-desc=""HOME-S" is a group photography exhibition presented at the Kapralos Museum in Agrinio, Greece, bringing together 212 photographers from 38 countries. Through diverse cultural and personal perspectives, the exhibition explores the idea of ​​"home" as an open and multifaceted condition, where images move between the familiar and the strange, presence and absence, and the various ways of belonging."
        data-images="https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000083/photopolis-1_rhyasm.webp|https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000083/photopolis-2_pjlwgz.webp|https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000084/photopolis-3_kd5abx.webp"
        data-video="">
        <img src="https://res.cloudinary.com/dkicubwax/image/upload/w_400,q_auto,f_auto/v1777000081/photopolis-1-thumb_rpyhp5.webp"
             alt="Photopolis Home-S Greece 2026"
             fetchpriority="high"
             decoding="async"
             width="800" height="1000">
      </div>

      <div class="project"
        data-title="RUIDO - POEMAS DE LA CALLE - PERU 2026"
        data-desc=""Poemas de la calle" This street photography exhibition, held at Ruido and co-organized with Street Photography Peru (SPP), brings together the work of 43 national and international photographers. The exhibition offers a visual journey through the city via diverse perspectives that capture the everyday, the unexpected, and the urban, revealing multiple ways of inhabiting and observing public space in the country."
        data-images="https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000088/ruido-1_itygn2.webp|https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000086/ruido-2_f0qmfo.webp|https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000087/ruido-3_imig6p.webp|https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000089/ruido-4_ejmg7u.webp"
        data-video="https://res.cloudinary.com/dkicubwax/video/upload/v1777000093/ruido-video-1_xehyft.mp4">
        <img loading="lazy" decoding="async"
             src="https://res.cloudinary.com/dkicubwax/image/upload/w_400,q_auto,f_auto/v1777000084/ruido-1-thumb_axarxe.webp"
             alt="Ruido — Poemas de la calle Peru 2026"
             width="800" height="1000">
      </div>

      <div class="project"
        data-title="ID - KLPA - AUTOPORTRAIT STUDENTS - MALAYSIA SOON"
        data-desc="The ID project represents my tireless quest to understand who I am. The photographs seek to explore the thoughts and feelings I experience during my search for my identity. This photograph is a double exposure of sand and sea, directly related to the end of the poem *El lenguado* by Peruvian poet José Watanabe. It reflects an acceptance that identity is not singular, but something that expands and transforms.
This work was selected as a finalist in the Kuala Lumpur International Photo Awards 2025, in the student category of self-portrait."
        data-images="https://res.cloudinary.com/dkicubwax/image/upload/w_800,q_auto,f_auto/v1777000081/klpa-1_etr2fu.webp"
        data-video="">
        <img loading="lazy" decoding="async"
             src="https://res.cloudinary.com/dkicubwax/image/upload/w_400,q_auto,f_auto/v1777000080/klpa-1-thumb_x9oenr.webp"
             alt="ID — KLPA Autoportrait Students Malaysia"
             width="800" height="1000">
      </div>

    </div>
